<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MOBILE WebGL VER 3.0</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=CEB52025-E065-364C-9DBA-44880E3B02B8"></script>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow: hidden;
}

#vmap{
    width:100%;
    height:100%;
}

.layer-control {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.95);
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    max-height: 80vh;
    overflow-y: auto;
    width: 200px;
}

.layer-section {
    margin-bottom: 10px;
    padding-bottom: 5px;
}
.layer-section:not(:last-child) {
    border-bottom: 1px solid #eee;
}
.layer-section-title {
    font-weight: bold;
    margin-bottom: 6px;
    color: #555;
    font-size: 12px;
}

.layer-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
}

.layer-item:last-child {
    margin-bottom: 0;
}

.layer-item input {
    margin-right: 8px;
    width: 18px;
    height: 18px;
    accent-color: #2563eb;
    cursor: pointer;
}

.legend-box {
    margin-top: 4px;
    margin-left: 26px;
    display: none;
}
.legend-box img {
    max-width: 150px;
    border: 1px solid #ccc;
    background: #fff;
}

.map-mode-select {
    width: 100%;
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
    font-size: 13px;
    background-color: #fff;
    cursor: pointer;
}
</style>

</head>

<body>

<div id="vmap"></div>

<div class="layer-control">
    <div class="layer-section">
        <div class="layer-section-title">기본 구역</div>
        <label class="layer-item">
            <input type="checkbox" id="chk-garo" checked>
            <span>가로주택 2구역 (적색)</span>
        </label>
        <label class="layer-item">
            <input type="checkbox" id="chk-sinsok" checked>
            <span>신속통합요청 (청색)</span>
        </label>
    </div>
    
    <div class="layer-section" id="wms-layer-section">
        <div class="layer-section-title">WMS 주제도</div>
    </div>

    <div class="layer-section">
        <div class="layer-section-title">지도 모드 변경</div>
        <select id="map-mode-selector" class="map-mode-select">
            <option value="2d-map" selected>2D 지도</option>
            <option value="3d-map">3D 지도</option>
        </select>
    </div>
</div>

<script>

//=========================
// VWorld Map 생성
//=========================
vw.MapControllerOption = {
    container : "vmap",
    mapMode : "2d-map",
    basemapType : vw.ol3.BasemapType.GRAPHIC,
    controlDensity : vw.ol3.DensityType.BASIC,
    interactionDensity : vw.ol3.DensityType.BASIC,
    controlsAutoArrange : true,
    homePosition : vw.ol3.CameraPosition,
    initPosition : vw.ol3.CameraPosition,
};
mapController = new vw.MapController(vw.MapControllerOption);
mapController.setMode( "2d-map" );

var map = mapController.Map2D;

// 글로벌 레이어 변수 선언
var sourceGaro, layerGaro;
var sourceSinsok, layerSinsok;

//=========================
// 💡 벡터 레이어 초기화 및 데이터 로드 통합 함수
//=========================
function initVectorLayers() {
    // 1. 가로주택 2구역 레이어 재생성
    sourceGaro = new ol.source.Vector();
    layerGaro = new ol.layer.Vector({
        source: sourceGaro,
        style: new ol.style.Style({
            stroke: new ol.style.Stroke({ color: "#ff0000", width: 3 }),
            fill: new ol.style.Fill({ color: "rgba(255, 0, 0, 0.2)" })
        }),
        visible: document.getElementById('chk-garo').checked // ✨ 현재 체크박스 상태 강제 동기화
    });

    // 2. 신속통합요청 레이어 재생성
    sourceSinsok = new ol.source.Vector();
    layerSinsok = new ol.layer.Vector({
        source: sourceSinsok,
        style: new ol.style.Style({
            stroke: new ol.style.Stroke({ color: "#0055ff", width: 3 }),
            fill: new ol.style.Fill({ color: "rgba(0, 85, 255, 0.15)" })
        }),
        visible: document.getElementById('chk-sinsok').checked // ✨ 현재 체크박스 상태 강제 동기화
    });

    // 지도에 추가
    map.addLayer(layerGaro);
    map.addLayer(layerSinsok);

    // ✨ 레이어가 새롭게 깔렸으므로 Polygon 데이터들도 다시 주입해줍니다.
    loadPolygonData();
}

//=========================
// 💡 데이터 주입 전용 함수
//=========================
function loadPolygonData() {
    // [데이터 A] 가로주택 2구역
    const coordsGaroLonLat = [
        [127.01975725809315,37.576627466724986], [127.01980568296834,37.5765141584602],
        [127.01978031755753,37.576325920155355], [127.01992559218306,37.57567896157653],
        [127.01931912827014,37.57561316886381], [127.01909083957284,37.57560220340599],
        [127.01888791628637,37.57560220340599], [127.01885563303625,37.57582151225466],
        [127.0189201995365,37.57604630315417],  [127.01933988178804,37.576340540623264],
        [127.01939061260966,37.57644288381823], [127.01960045373544,37.576576295271906],
        [127.0197042213251,37.5766292942762],   [127.01975725809315,37.576627466724986]
    ];

    const coordsGaro3857 = coordsGaroLonLat.map(function(coord) {
        return ol.proj.fromLonLat(coord);
    });

    const polyGaro = new ol.geom.Polygon([coordsGaro3857]);
    const featureGaro = new ol.Feature({
        geometry: polyGaro,
        name: '가로주택2구역'
    });
    sourceGaro.addFeature(featureGaro);

    // [데이터 B] 신속통합요청 전체 정비구역
    const coordsSinsok = [
        [ 127.01935598174003, 37.57431377647724 ], [ 127.01929160872369, 37.574432822295634 ],
        [ 127.01895901480589, 37.574466835351664 ], [ 127.01899120131407, 37.57465390688204 ],
        [ 127.0191467694369,  37.57474319085587 ], [ 127.01909848967462, 37.57521937024176 ],
        [ 127.01895901480589, 37.57535116935516 ], [ 127.01885172644525, 37.5757678230826 ],
        [ 127.01859314332256, 37.57573773792715 ], [ 127.01850709089783, 37.57617422094965 ],
        [ 127.01858886996178, 37.57726860749236 ], [ 127.01902504967556, 37.57799962354621 ],
        [ 127.02014516729398, 37.57841100482445 ], [ 127.02029087365085, 37.57816561977413 ],
        [ 127.02031819359276, 37.57667885776445 ], [ 127.02086459243103, 37.57547354832799 ],
        [ 127.01979000804914, 37.57497554052983 ], [ 127.01999946093714, 37.57452083484892 ],
        [ 127.01935598174003, 37.57431377647724 ]
    ];

    const coordsSinsok4326 = coordsSinsok.map(function(coord) {
        return ol.proj.fromLonLat(coord);
    });

    const polySinsok = new ol.geom.Polygon([coordsSinsok4326]);
    const featureSinsok = new ol.Feature({
        geometry: polySinsok,
        name: '신속통합요청'
    });
    sourceSinsok.addFeature(featureSinsok);
}

// 최초 1회 전체 실행
initVectorLayers();


//=========================
// WMS 레이어 동적 관리 설정
//=========================
const wmsLayerList = [
    { id: "lt_c_landinfobasemap", title: "지적도 기본", style: "lt_c_landinfobasemap" },
    { id: "lt_c_bldginfo", title: "건물정보", style: "lt_c_bldginfo" }
];

const wmsLayerInstances = {};

function initWmsLayers() {
    let code = map.getView().getProjection().getCode();
    
    wmsLayerList.forEach(function(item) {
        let this_val = item.id;
        let this_title = item.title;
        let this_style = item.style;

        if ($(`#chk-${this_val}`).length === 0) {
            let wmsHtml = `
                <div class="wms-control-item">
                    <label class="layer-item">
                        <input type="checkbox" id="chk-${this_val}">
                        <span>${this_title}</span>
                    </label>
                    <div class="legend-box" id="legend-${this_val}"></div>
                </div>
            `;
            $('#wms-layer-section').append(wmsHtml);

            let imgSrc = "https://api.vworld.kr/req/image?key=CEB52025-E065-364C-9DBA-44880E3B02B8&service=image&request=GetLegendGraphic&format=png&type=ALL&layer="+this_val+"&style="+this_style;
            $(`#legend-${this_val}`).html(`<img src="${imgSrc}" alt="${this_title}의 범례이미지">`);

            $(`#chk-${this_val}`).on('change', function(e) {
                let isChecked = e.target.checked;
                if(wmsLayerInstances[this_val]) {
                    wmsLayerInstances[this_val].setVisible(isChecked);
                }
                if(isChecked) { $(`#legend-${this_val}`).slideDown(200); } 
                else { $(`#legend-${this_val}`).slideUp(200); }
            });
        }

        let isCurrentlyChecked = $(`#chk-${this_val}`).is(':checked');
        
        let layer_tile = new ol.layer.Tile({
            title: this_title,
            id: this_val,
            name: "wms_theme", 
            projection: code,
            extent: map.getView().getProjection().getExtent(),
            minZoom: 0,
            maxZoom: 22,
            tilePixelRatio: 1,
            tileSize: [512, 512],
            visible: isCurrentlyChecked, 
            source: new ol.source.TileWMS({
                url: "https://api.vworld.kr/req/wms?",
                params: {
                    LAYERS: this_val.replace("_INFO","").toLowerCase(),
                    STYLES: this_style,
                    CRS: code,
                    apikey: "CEB52025-E065-364C-9DBA-44880E3B02B8",
                    DOMAIN: "http://localhost:8080",
                    title: this_title,
                    FORMAT: "image/png",
                    WIDTH: 512,
                    HEIGHT: 512
                }
            })
        });
        layer_tile.setZIndex(5);
        map.addLayer(layer_tile);
        
        wmsLayerInstances[this_val] = layer_tile; 
    });
}
initWmsLayers();

//=========================
// 이벤트 바인딩 함수화
//=========================
function bindCheckboxEvents() {
    const chkGaro = document.getElementById('chk-garo');
    const chkSinsok = document.getElementById('chk-sinsok');

    // 이벤트 중복 축적 방지를 위해 엘리먼트 클론 생성 교체
    chkGaro.replaceWith(chkGaro.cloneNode(true));
    chkSinsok.replaceWith(chkSinsok.cloneNode(true));

    document.getElementById('chk-garo').addEventListener('change', function(e) {
        if(layerGaro) layerGaro.setVisible(e.target.checked);
    });

    document.getElementById('chk-sinsok').addEventListener('change', function(e) {
        if(layerSinsok) layerSinsok.setVisible(e.target.checked);
    });
}
bindCheckboxEvents(); 


//=========================
// 💡 2D / 3D 지도 전환 핵심 로직 수정
//=========================
document.getElementById('map-mode-selector').addEventListener('change', function(e) {
    let targetMode = e.target.value;
    
    mapController.setMode(targetMode);
    
    if (targetMode === "2d-map") {
        map = mapController.Map2D;
        
        // 중요 순서: 레이어 생성(+데이터 로드) -> 주제도 연결 -> 체크박스 제어권 갱신
        initVectorLayers();     
        initWmsLayers();        
        bindCheckboxEvents();   
        
        // 2D 복귀 시 화면 앵글 재조정
        focusToLayers();
    }
});


//=========================
// 두 구역 자동 포커싱 함수화
//=========================
function focusToLayers() {
    if (sourceGaro && sourceSinsok) {
        const totalExtent = ol.extent.createEmpty();
        ol.extent.extend(totalExtent, sourceGaro.getExtent());
        ol.extent.extend(totalExtent, sourceSinsok.getExtent());

        map.getView().fit(totalExtent, {
            padding: [60, 60, 60, 60],
            duration: 1000
        });
    }
}
focusToLayers(); // 초기 실행

</script>
</body>
</html>
