<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>숭인2동신속통합추진 정비지도</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=CEB52025-E065-364C-9DBA-44880E3B02B8"></script>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow: hidden;
}

#vmap{
    width:100%;
    height:100%;
}

.layer-control {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.95);
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    max-height: 80vh;
    overflow-y: auto;
    width: 210px;
}

.layer-section {
    margin-bottom: 10px;
    padding-bottom: 5px;
}
.layer-section:not(:last-child) {
    border-bottom: 1px solid #eee;
}
.layer-section-title {
    font-weight: bold;
    margin-bottom: 6px;
    color: #555;
    font-size: 12px;
}

.layer-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
}

.layer-item:last-child {
    margin-bottom: 0;
}

.layer-item input {
    margin-right: 8px;
    width: 18px;
    height: 18px;
    accent-color: #2563eb;
    cursor: pointer;
}

.legend-box {
    margin-top: 4px;
    margin-left: 26px;
    display: none;
}
.legend-box img {
    max-width: 150px;
    border: 1px solid #ccc;
    background: #fff;
}

/* 🗺 지도 모드 선택기 스타일 */
.map-mode-select {
    width: 100%;
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
    font-size: 13px;
    background-color: #fff;
    cursor: pointer;
}
</style>

</head>

<body>

<div id="vmap"></div>

<div class="layer-control">
    <div class="layer-section">
        <div class="layer-section-title">기본 구역</div>
        <label class="layer-item">
            <input type="checkbox" id="chk-garo1" checked>
            <span>가로주택 1구역 (주황)</span>
        </label>
        <label class="layer-item">
            <input type="checkbox" id="chk-garo2" checked>
            <span>가로주택 2구역 (적색)</span>
        </label>
        <label class="layer-item">
            <input type="checkbox" id="chk-garo3" checked>
            <span>가로주택 3구역 (보라)</span>
        </label>
        <label class="layer-item">
            <input type="checkbox" id="chk-sinsok" checked>
            <span>신속통합요청 (청색)</span>
        </label>
    </div>
    
    <div class="layer-section" id="wms-layer-section">
        <div class="layer-section-title">WMS 주제도</div>
    </div>

    <div class="layer-section">
        <div class="layer-section-title">지도 모드 변경</div>
        <select id="map-mode-selector" class="map-mode-select">
            <option value="2d-map" selected>2D 지도</option>
            <option value="3d-map">3D 지도</option>
        </select>
    </div>
</div>

<script>

//=========================
// VWorld Map 생성
//=========================
vw.MapControllerOption = {
    container : "vmap",
    mapMode : "2d-map",
    basemapType : vw.ol3.BasemapType.GRAPHIC,
    controlDensity : vw.ol3.DensityType.BASIC,
    interactionDensity : vw.ol3.DensityType.BASIC,
    controlsAutoArrange : true,
    homePosition : vw.ol3.CameraPosition,
    initPosition : vw.ol3.CameraPosition,
};
mapController = new vw.MapController(vw.MapControllerOption);
mapController.setMode( "2d-map" );

var map = mapController.Map2D;

// ✨ 수정: 각 구역의 개별 소스 및 레이어 변수 정의
var sourceGaro1, layerGaro1;
var sourceGaro2, layerGaro2;
var sourceGaro3, layerGaro3;
var sourceSinsok, layerSinsok;

//=========================
// 레이어 설정 및 색상 분리
//=========================

// 가로주택 1구역: 주황색(Orange)
sourceGaro1 = new ol.source.Vector();
layerGaro1 = new ol.layer.Vector({
    source: sourceGaro1,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({ color: "#ff8c00", width: 3 }),
        fill: new ol.style.Fill({ color: "rgba(255, 140, 0, 0.2)" }),
        text: new ol.style.Text({
            text: "가로주택 1구역\n(신통기획 찬성)",
            font: "14px sans-serif",
            fill: new ol.style.Fill({ color: "#000" }),
            stroke: new ol.style.Stroke({ color: "#fff", width: 3 }),
            overflow: true,
            placement: "point",
            textAlign: "center",
            textBaseline: "middle"
        })
    })
});

// 가로주택 2구역: 적색(Red)
sourceGaro2 = new ol.source.Vector();
layerGaro2 = new ol.layer.Vector({
    source: sourceGaro2,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({ color: "#ff0000", width: 3 }),
        fill: new ol.style.Fill({ color: "rgba(255, 0, 0, 0.2)" }),
        text: new ol.style.Text({
            text: "[가로 2구역]\n  (핵심 문제 지역)\n 주민 선출 없이 등록 후 \n독단적 사임 거부 중",
            font: "14px sans-serif",
            fill: new ol.style.Fill({ color: "#000" }),
            stroke: new ol.style.Stroke({ color: "#fff", width: 3 }),
            overflow: true,
            placement: "point",
            textAlign: "center",
            textBaseline: "middle"
        })
    })
});

// 가로주택 3구역: 보라색(Purple)
sourceGaro3 = new ol.source.Vector();
layerGaro3 = new ol.layer.Vector({
    source: sourceGaro3,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({ color: "#9400d3", width: 3 }),
        fill: new ol.style.Fill({ color: "rgba(148, 0, 211, 0.2)" }),
        text: new ol.style.Text({
            text: "가로주택 3구역\n(주민 대표 주택 매도)\n추진 자격 상실\n 및 사업 무산",
            font: "14px sans-serif",
            fill: new ol.style.Fill({ color: "#000" }),
            stroke: new ol.style.Stroke({ color: "#fff", width: 3 }),
            overflow: true,
            placement: "point",
            textAlign: "center",
            textBaseline: "middle"
        })
    })
});

// 신속통합요청: 청색(Blue)
sourceSinsok = new ol.source.Vector();
layerSinsok = new ol.layer.Vector({
    source: sourceSinsok,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({ color: "#0055ff", width: 3 }),
        fill: new ol.style.Fill({ color: "rgba(0, 85, 255, 0.15)" }),
        text: new ol.style.Text({
            text: "쪼개진 가로주택 해제,\n 대규모 신속통합기획으로\n 하나의 대단지 통합 정비!\n\n\n\n\n\n\n\n\n\n\n\n",
            font: "14px sans-serif",
            fill: new ol.style.Fill({ color: "#000" }),
            stroke: new ol.style.Stroke({ color: "#fff", width: 3 }),
            overflow: true,
            placement: "point",
            textAlign: "center",
            textBaseline: "middle"
        })
    })
});

// 초기 레이어 주입 함수
function initVectorLayers() {
    map.addLayer(layerGaro1);
    map.addLayer(layerGaro2);
    map.addLayer(layerGaro3);
    map.addLayer(layerSinsok);
}
initVectorLayers();


//=========================
// Polygon 직접 생성 및 데이터 매핑
//=========================

// [데이터] 가로주택 1구역
const coordsGaro1LonLat = [
    [127.01977574647704,37.57662334245326],[127.0197988059414,37.57649175863847],
    [127.01978497026276,37.57634555412713],[127.01993255083477,37.575713216309964],
    [127.01978958215564,37.57499680397133],[127.02084109373097,37.57545735555168],
    [127.02031533794329,37.57664892816801], 
    [127.01989565569174,37.576696444472105],[127.01977574647704,37.57662334245326]
];
const coordsGaro13857 = coordsGaro1LonLat.map(function(coord) { return ol.proj.fromLonLat(coord); });
const polyGaro1 = new ol.geom.Polygon([coordsGaro13857]);
const featureGaro1 = new ol.Feature({ geometry: polyGaro1, name: '가로주택1구역' });
sourceGaro1.addFeature(featureGaro1);


// [데이터] 가로주택 2구역
const coordsGaro2LonLat = [
    [127.01975725809315,37.576627466724986], [127.01980568296834,37.5765141584602],
    [127.01978031755753,37.576325920155355], [127.01992559218306,37.57567896157653],
    [127.01931912827014,37.57561316886381], [127.01909083957284,37.57560220340599],
    [127.01888791628637,37.57560220340599], [127.01885563303625,37.57582151225466],
    [127.0189201995365,37.57604630315417],  [127.01933988178804,37.576340540623264],
    [127.01939061260966,37.57644288381823], [127.01960045373544,37.576576295271906],
    [127.0197042213251,37.5766292942762],   [127.01975725809315,37.576627466724986]
];
const coordsGaro23857 = coordsGaro2LonLat.map(function(coord) { return ol.proj.fromLonLat(coord); });
const polyGaro2 = new ol.geom.Polygon([coordsGaro23857]);
const featureGaro2 = new ol.Feature({ geometry: polyGaro2, name: '가로주택2구역' });
sourceGaro2.addFeature(featureGaro2);


// [데이터] 가로주택 3구역
const coordsGaro3LonLat = [
    [127.01956191190754,37.574938218817806],[127.01916029243276,37.57490790394439],
    [127.01911630553788,37.575148906846934],[127.01907614359041,37.57524136687296],
    [127.01895948269534,37.575323216636264],[127.01888680869513,37.57560665863991],
    [127.01910100574838,37.575612721558684],[127.01936683959126,37.575617268747465],
    [127.01959251148661,37.57564606760312],[127.01956191190754,37.574938218817806]
];
const coordsGaro33857 = coordsGaro3LonLat.map(function(coord) { return ol.proj.fromLonLat(coord); });
const polyGaro3 = new ol.geom.Polygon([coordsGaro33857]);
const featureGaro3 = new ol.Feature({ geometry: polyGaro3, name: '가로주택3구역' });
sourceGaro3.addFeature(featureGaro3);


// [데이터 B] 신속통합요청 전체 정비구역
const coordsSinsok = [
  [ 127.01935598174003, 37.57431377647724 ], [ 127.01929160872369, 37.574432822295634 ],
  [ 127.01895901480589, 37.574466835351664 ], [ 127.01899120131407, 37.57465390688204 ],
  [ 127.0191467694369,  37.57474319085587 ], [ 127.01909848967462, 37.57521937024176 ],
  [ 127.01895901480589, 37.57535116935516 ], [ 127.01885172644525, 37.5757678230826 ],
  [ 127.01859314332256, 37.57573773792715 ], [ 127.01850709089783, 37.57617422094965 ],
  [ 127.01858886996178, 37.57726860749236 ], [ 127.01902504967556, 37.57799962354621 ],
  [ 127.02014516729398, 37.57841100482445 ], [ 127.02029087365085, 37.57816561977413 ],
  [ 127.02031819359276, 37.57667885776445 ], [ 127.02086459243103, 37.57547354832799 ],
  [ 127.01979000804914, 37.57497554052983 ], [ 127.01999946093714, 37.57452083484892 ],
  [ 127.01935598174003, 37.57431377647724 ]
];
const coordsSinsok4326 = coordsSinsok.map(function(coord) { return ol.proj.fromLonLat(coord); });
const polySinsok = new ol.geom.Polygon([coordsSinsok4326]);
const featureSinsok = new ol.Feature({ geometry: polySinsok, name: '신속통합요청' });
sourceSinsok.addFeature(featureSinsok);



//=========================
// WMS 레이어 동적 관리 설정
//=========================
const wmsLayerList = [
    { id: "lt_c_landinfobasemap", title: "지적도 기본", style: "lt_c_landinfobasemap" },
    { id: "lt_c_bldginfo", title: "건물정보", style: "lt_c_bldginfo" }
];

const wmsLayerInstances = {};

function initWmsLayers() {
    let code = map.getView().getProjection().getCode();
    
    wmsLayerList.forEach(function(item) {
        let this_val = item.id;
        let this_title = item.title;
        let this_style = item.style;

        if ($(`#chk-${this_val}`).length === 0) {
            let wmsHtml = `
                <div class="wms-control-item">
                    <label class="layer-item">
                        <input type="checkbox" id="chk-${this_val}">
                        <span>${this_title}</span>
                    </label>
                    <div class="legend-box" id="legend-${this_val}"></div>
                </div>
            `;
            $('#wms-layer-section').append(wmsHtml);

            let imgSrc = "https://api.vworld.kr/req/image?key=CEB52025-E065-364C-9DBA-44880E3B02B8&service=image&request=GetLegendGraphic&format=png&type=ALL&layer="+this_val+"&style="+this_style;
            $(`#legend-${this_val}`).html(`<img src="${imgSrc}" alt="${this_title}의 범례이미지">`);

            $(`#chk-${this_val}`).on('change', function(e) {
                let isChecked = e.target.checked;
                if(wmsLayerInstances[this_val]) {
                    wmsLayerInstances[this_val].setVisible(isChecked);
                }
                if(isChecked) { $(`#legend-${this_val}`).slideDown(200); } 
                else { $(`#legend-${this_val}`).slideUp(200); }
            });
        }

        let isCurrentlyChecked = $(`#chk-${this_val}`).is(':checked');
        
        let layer_tile = new ol.layer.Tile({
            title: this_title,
            id: this_val,
            name: "wms_theme", 
            projection: code,
            extent: map.getView().getProjection().getExtent(),
            minZoom: 0,
            maxZoom: 22,
            tilePixelRatio: 1,
            tileSize: [512, 512],
            visible: isCurrentlyChecked, 
            source: new ol.source.TileWMS({
                url: "https://api.vworld.kr/req/wms?",
                params: {
                    LAYERS: this_val.replace("_INFO","").toLowerCase(),
                    STYLES: this_style,
                    CRS: code,
                    apikey: "CEB52025-E065-364C-9DBA-44880E3B02B8",
                    DOMAIN: "http://localhost:8080",
                    title: this_title,
                    FORMAT: "image/png",
                    WIDTH: 512,
                    HEIGHT: 512
                }
            })
        });
        layer_tile.setZIndex(5);
        map.addLayer(layer_tile);
        
        wmsLayerInstances[this_val] = layer_tile; 
    });
}
initWmsLayers();

//=========================
// ✨ 수정: 각 구역 체크박스에 대한 이벤트 리스너 분리 및 복제바인딩
//=========================
function bindCheckboxEvents() {
    const chkGaro1 = document.getElementById('chk-garo1');
    const chkGaro2 = document.getElementById('chk-garo2');
    const chkGaro3 = document.getElementById('chk-garo3');
    const chkSinsok = document.getElementById('chk-sinsok');

    // 2D/3D 전환 시 무한 이벤트 방지를 위한 초기화 노드 치환
    chkGaro1.replaceWith(chkGaro1.cloneNode(true));
    chkGaro2.replaceWith(chkGaro2.cloneNode(true));
    chkGaro3.replaceWith(chkGaro3.cloneNode(true));
    chkSinsok.replaceWith(chkSinsok.cloneNode(true));

    document.getElementById('chk-garo1').addEventListener('change', function(e) {
        if(layerGaro1) layerGaro1.setVisible(e.target.checked);
    });
    document.getElementById('chk-garo2').addEventListener('change', function(e) {
        if(layerGaro2) layerGaro2.setVisible(e.target.checked);
    });
    document.getElementById('chk-garo3').addEventListener('change', function(e) {
        if(layerGaro3) layerGaro3.setVisible(e.target.checked);
    });
    document.getElementById('chk-sinsok').addEventListener('change', function(e) {
        if(layerSinsok) layerSinsok.setVisible(e.target.checked);
    });
}
bindCheckboxEvents(); 


//=========================
// 💡 2D / 3D 지도 전환 (Select 컨트롤러 기능)
//=========================
document.getElementById('map-mode-selector').addEventListener('change', function(e) {
    let targetMode = e.target.value;
    
    mapController.setMode(targetMode);
    
    if (targetMode === "2d-map") {
        map = mapController.Map2D;
        
        initVectorLayers();     
        initWmsLayers();        
        bindCheckboxEvents();   
    }
});


//=========================
// 모든 구역이 다 보이도록 영역 계산 및 포커싱
//=========================
const totalExtent = ol.extent.createEmpty();
ol.extent.extend(totalExtent, sourceGaro1.getExtent());
ol.extent.extend(totalExtent, sourceGaro2.getExtent());
ol.extent.extend(totalExtent, sourceGaro3.getExtent());
ol.extent.extend(totalExtent, sourceSinsok.getExtent());

map.getView().fit(totalExtent, {
    padding: [60, 60, 60, 60],
    duration: 1000
});

</script>
</body>
</html>
